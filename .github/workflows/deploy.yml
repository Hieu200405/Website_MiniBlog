name: CD - Auto Deploy to Render

on:
  push:
    branches: [Dev] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Trigger Deploy cho Backend
      - name: Trigger Backend Deploy
        if: env.BACKEND_URL != ''
        run: |
          echo "🚀 Triggering Backend Deploy..."
          curl -X GET "${{ env.BACKEND_URL }}"
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_HOOK_URL }}

      # 2. Trigger Deploy cho Frontend
      - name: Trigger Frontend Deploy
        if: env.FRONTEND_URL != ''
        run: |
          echo "🚀 Triggering Frontend Deploy..."
          curl -X GET "${{ env.FRONTEND_URL }}"
        env:
          FRONTEND_URL: ${{ secrets.RENDER_FRONTEND_HOOK_URL }}
