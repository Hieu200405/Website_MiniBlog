# Render Blueprint - Docker Hub Edition
# Luồng: Code -> GitHub CI -> Docker Hub -> Render (Pull Image)

services:
  # 1. Frontend Configuration
  - type: web
    name: miniblog-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile.prod
    plan: free
    region: singapore
    envVars:
      - key: VITE_API_URL
        sync: false
        placeholder: "https://your-backend-service.onrender.com"

  # 2. Backend Configuration
  - type: web
    name: miniblog-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        sync: false
        placeholder: "postgresql://user:pass@ep-hostname.aws.neon.tech/dbname?sslmode=require"
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
