# Render Blueprint - Docker Hub Edition
# Luồng: Code -> GitHub CI -> Docker Hub -> Render (Pull Image)

services:
  # 1. Frontend Configuration
  - type: web
    name: miniblog-frontend
    env: docker
    # Lưu ý: Thay 'hieu200405' bằng username Docker Hub thực tế của bạn nếu khác
    image: hieu200405/miniblog-frontend:latest 
    plan: free
    region: singapore
    envVars:
      - key: VITE_API_URL
        fromService:
          name: miniblog-backend
          type: web
          property: host

  # 2. Backend Configuration
  - type: web
    name: miniblog-backend
    env: docker
    image: hieu200405/miniblog-backend:latest
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        sync: false
        placeholder: "postgresql://user:pass@ep-hostname.aws.neon.tech/dbname?sslmode=require"
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
