# Render Blueprint IaC - Elite Edition (Using External Neon.tech DB)

services:
  # 1. Frontend Configuration
  - type: web
    name: miniblog-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile.prod
    dockerContext: ./frontend
    plan: free
    region: singapore
    envVars:
      - key: VITE_API_URL
        fromService:
          name: miniblog-backend
          type: web
          property: host # Changed from 'url' to 'host' to fix Render error

  # 2. Backend Configuration
  - type: web
    name: miniblog-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        sync: false # Requires manual entry on first deploy for security
        placeholder: "postgresql://user:pass@ep-hostname.aws.neon.tech/dbname?sslmode=require"
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
