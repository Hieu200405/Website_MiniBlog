apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniblog-frontend
  labels:
    app: miniblog
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miniblog
      component: frontend
  template:
    metadata:
      labels:
        app: miniblog
        component: frontend
    spec:
      containers:
      - name: frontend
        image: ${DOCKERHUB_USERNAME}/miniblog-frontend:latest
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
        resources:
          limits:
            cpu: "300m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: miniblog-frontend
spec:
  selector:
    app: miniblog
    component: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
